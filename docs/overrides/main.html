{% extends "base.html" %}

{% block extrahead %}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;500;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
{% endblock %}

{% block scripts %}
  {{ super() }}
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
  <script>
    document$.subscribe(function() {
      MathJax.startup.promise.then(function() {
        MathJax.typesetPromise();
      });
    });

    /* Wrap the nav drawer title text in a span so CSS gradient can target
       just the text while the parent keeps a solid background (blocks
       scroll-through without background-clip:text on the container).
       Also inject a sticky fade div just below the title so nav items
       dissolve smoothly as they scroll behind it. */
    document$.subscribe(function() {
      function injectFade(navSelector, wrapText) {
        document.querySelectorAll(navSelector + ' > .md-nav__title').forEach(function(title) {
          if (wrapText && !title.querySelector('.md-nav__title-text')) {
            title.childNodes.forEach(function(node) {
              if (node.nodeType === 3 && node.textContent.trim()) {
                var span = document.createElement('span');
                span.className = 'md-nav__title-text';
                span.textContent = node.textContent;
                title.replaceChild(span, node);
              }
            });
          }

          if (!title.parentNode.querySelector('.md-nav__title-fade')) {
            var fade = document.createElement('div');
            fade.className = 'md-nav__title-fade';
            title.parentNode.insertBefore(fade, title.nextSibling);
          }

          var fade = title.parentNode.querySelector('.md-nav__title-fade');
          requestAnimationFrame(function() {
            var h = title.getBoundingClientRect().height;
            fade.style.top = (h > 0 ? h : title.offsetHeight) + 'px';
          });
        });
      }

      injectFade('.md-nav--primary', true);
      injectFade('.md-nav--secondary', false);
    });
  </script>
{% endblock %}
