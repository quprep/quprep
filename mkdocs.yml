site_name: QuPrep
site_description: Quantum data preparation — the missing preprocessing layer between classical datasets and quantum computing frameworks.
site_url: https://docs.quprep.org
repo_url: https://github.com/quprep/quprep
repo_name: quprep/quprep

theme:
  name: material
  custom_dir: docs/overrides
  favicon: img/favicon.png
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: deep-purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  font: false
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - toc.follow

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/quprep/quprep
      name: QuPrep on GitHub
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/quprep/
      name: QuPrep on PyPI

hooks:
  - docs/hooks.py

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/mathjax.js

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
            show_category_heading: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            docstring_style: numpy
            merge_init_into_class: true

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quickstart: getting-started/quickstart.md
  - Guides:
    - Encoding Guide: guides/encodings.md
    - Dimensionality Reduction: guides/reduction.md
    - Framework Export: guides/export.md
    - QUBO / Ising: guides/qubo.md
    - Validation & Cost: guides/validation.md
    - Inspect & Benchmark: guides/inspect_benchmark.md
    - Comparison & Fingerprinting: guides/comparison.md
    - Qubit Suggestion: guides/suggest.md
    - Data Drift Detection: guides/drift.md
    - Plugin System: guides/plugins.md
    - Data Modalities: guides/modalities.md
  - API Reference:
    - Overview: api/index.md
    - Pipeline: api/pipeline.md
    - Encoders: api/encoders.md
    - Exporters: api/exporters.md
    - QUBO / Ising: api/qubo.md
    - Validation & Cost: api/validation.md
    - Comparison: api/comparison.md
    - Qubit Suggestion: api/suggest.md
    - Drift Detection: api/drift.md
    - Modalities: api/modalities.md
    - Plugin Registry: api/plugins.md
  - Contributing: contributing.md
