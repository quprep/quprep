site_name: QuPrep
site_description: Quantum data preparation — the missing preprocessing layer between classical datasets and quantum computing frameworks.
site_url: https://quprep.readthedocs.io
repo_url: https://github.com/quprep/quprep
repo_name: quprep/quprep

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true
  - admonition
  - toc:
      permalink: true

extra_javascript:
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quickstart: getting-started/quickstart.md
  - Guides:
    - Encoding Guide: guides/encodings.md
    - Dimensionality Reduction: guides/reduction.md
    - Framework Export: guides/export.md
    - QUBO / Ising: guides/qubo.md
  - API Reference:
    - quprep: api/index.md
    - Pipeline: api/pipeline.md
    - Encoders: api/encoders.md
    - Exporters: api/exporters.md
  - Contributing: contributing.md
